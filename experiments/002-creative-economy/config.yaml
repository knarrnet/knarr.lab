experiment:
  id: "002"
  slug: "creative-economy"
  name: "100 Agents Build a Creative Economy"
  status: planned  # planned | running | concluded | failed | abandoned
  created: 2026-03-13
  started: null
  completed: null
  author: "Tyr (spec) / Viggo (impl)"
  version: "knarr-v0.45.0"
  duration_hours: 72
  nodes: 100

hypothesis: >
  Nodes specializing in high-quality creative output earn disproportionately more credits,
  settlement occurs autonomously on testnet KNARR, and stable trading-partner clusters
  emerge from quality reputation — all from zero initial configuration.

hypotheses:
  H1: "High-quality sage nodes earn disproportionately more credits (quality signal propagates economically)"
  H2: "Settlement occurs autonomously when credit utilization exceeds threshold, KNARR testnet tokens transferred"
  H3: "Nodes develop stable trading-partner preferences (trade clusters from quality reputation)"
  H0: "No meaningful differentiation — all nodes earn similar credits regardless of output quality"

success_criteria:
  - "SC-1: At least 10,000 cross-node skill invocations in 72h"
  - "SC-2: At least one settlement completes end-to-end on testnet KNARR"
  - "SC-3: Gini coefficient of final balances >= 0.3"
  - "SC-4: At least one node earns >3x median revenue (specialization)"
  - "SC-5: Pearson r >= 0.3 for quality score vs. revenue across sage nodes"

infrastructure:
  image: "knarr-node:v045-exp002"
  compose_file: "docker/swarm-cluster/compose/cluster-002.yml"
  gpu_0: "vLLM Qwen/Qwen3.5-4B (scribe nodes — text-summarize-lite)"
  gpu_1: "Ollama qwen3:14b + gemma3:12b (critic + oracle + sage nodes)"
  knarr_version: "0.45.0"
  gpu:
    count: 2
    type: "RTX 3090"
    vram_gb: 24
  bootstrap_node: "bootstrap:9010"

parameters:
  initial_credit: 15
  min_balance: -10
  settlement:
    threshold: 0.8          # trigger at 80% credit utilization
    min_interval_seconds: 300
    soft_target: 0.5        # netting target ratio
    min_amount: 1.0
  netting_interval_seconds: 60
  workload_generator:
    cycle_interval_min_seconds: 120
    cycle_interval_max_seconds: 300
    jitter: true
  skill_distribution:
    sage:
      count: 30
      skills: [echo, creative-gen-lite]
      model_backend: ollama
      model: "gemma3:12b"
      price: 3
      consumes: [quality-judge-lite, text-summarize-lite, cluster-state-query]
    critic:
      count: 20
      skills: [echo, quality-judge-lite]
      model_backend: ollama
      model: "qwen3:14b"
      price: 2
      consumes: [creative-gen-lite, text-summarize-lite, cluster-state-query]
    scribe:
      count: 40
      skills: [echo, text-summarize-lite]
      model_backend: vllm
      model: "Qwen/Qwen3.5-4B"
      price: 2
      consumes: [creative-gen-lite, quality-judge-lite, cluster-state-query]
    oracle:
      count: 10
      skills: [echo, cluster-state-query]
      model_backend: ollama
      model: "qwen3:14b"
      price: 1
      consumes: [creative-gen-lite, quality-judge-lite, text-summarize-lite]

airdrop:
  enabled: true
  node: "Tyr (running separately)"
  skill: "welcome-airdrop-lite"
  amount_knarr: 5.0
  trigger: "peer_joined (DHT event)"
  ledger: "plugin_state/airdrop/airdrop_ledger.json"
  known_gap: "BCW-01 — SPL Token-2022 ATA gap may cause failures (OPEN)"

collection:
  interval_seconds: 300
  token: "knarr-cluster-local"
  ports: "8301-8400"        # cockpit ports for nodes 1-100
  bootstrap_cockpit: 8200
  output_dir: "data/exp-002/"

metrics:
  primary: "quality_revenue_correlation"   # Pearson r of sage quality vs revenue
  secondary:
    - "gini_coefficient"
    - "total_transactions"
    - "unique_bilateral_pairs"
    - "settlement_count"
    - "network_graph_density"
    - "netting_cycles_completed"
    - "refused_transactions"
  per_node:
    - "balance"
    - "tasks_provided"
    - "tasks_consumed"
    - "revenue_cumulative"
    - "cost_cumulative"
    - "credit_utilization"
    - "avg_quality_score"    # sage nodes only
  per_pair:
    - "bilateral_balance"
    - "trade_count"
    - "direction"
    - "avg_quality_score"   # sage→critic pairs only

tags:
  - "creative-economy"
  - "quality-differentiated"
  - "100-nodes"
  - "settlement"
  - "testnet"
  - "airdrop"
  - "gini"
